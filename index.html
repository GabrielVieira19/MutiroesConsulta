<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutirões - Consulta de Horas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-center bg-no-repeat bg-cover"
      style="background-image: url('logo.png');">

    <!-- CAMADA ESCURA -->
    <div class="absolute inset-0 bg-black/40"></div>

    <!-- CONTAINER -->
    <div class="relative bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl w-full max-w-xl p-6">

        <!-- HEADER -->
        <div class="flex flex-col items-center mb-6">
            <img src="mutiroes.png" alt="Mutirões" class="w-32 mb-2">
            <p class="text-gray-500 text-sm">Consulta de horas acumuladas</p>
        </div>

        <!-- INPUT -->
        <input type="text" id="raInput" placeholder="Digite seu RA"
            class="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-400 outline-none">

        <button id="searchButton"
            class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-xl font-semibold transition">
            Consultar
        </button>

        <!-- RESULTADO -->
        <div id="result" class="mt-6 text-center"></div>

        <!-- EVENTOS -->
        <div id="eventsList" class="mt-4"></div>

    </div>

<script>

const GOOGLE_APPS_SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbznBys52q43XQnK79b6N6yPlxJWV5AvB0cDT_ifF7T9ddJtZlvaTo48UlOnGtK31nrT/exec';

const raInput = document.getElementById('raInput');
const searchButton = document.getElementById('searchButton');
const resultDiv = document.getElementById('result');
const eventsDiv = document.getElementById('eventsList');

// Buscar aluno pelo RA (novo modelo seguro, retornando dados de apenas 1 aluno)
async function fetchStudentByRA(ra) {
    resultDiv.innerHTML = '<p class="text-blue-600">Buscando dados...</p>';

    try {
        const response = await fetch(`${GOOGLE_APPS_SCRIPT_WEB_APP_URL}?ra=${ra}`);

        if (!response.ok) {
            throw new Error(`Erro HTTP: ${response.status}`);
        }

        const data = await response.json();
        return data;

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = '<p class="text-red-600">Erro ao carregar dados.</p>';
        return null;
    }
}

// Consulta ao clicar
searchButton.addEventListener('click', async () => {

    const ra = raInput.value.trim();

    if (!ra) {
        resultDiv.innerHTML = '<p class="text-red-600">Digite um RA válido.</p>';
        eventsDiv.innerHTML = '';
        return;
    }

    const data = await fetchStudentByRA(ra);

    if (!data || data.erro) {
        resultDiv.innerHTML = `<p class="text-red-600">${data?.erro || "Erro na busca."}</p>`;
        eventsDiv.innerHTML = '';
        return;
    }

    const student = data.student;
    const eventHours = data.eventHours;

    // Horas totais
    resultDiv.innerHTML = `
        <p class="text-2xl font-bold text-green-600">
            ${student.hours} horas acumuladas
        </p>
    `;

    // Eventos participados
    if (!student.events || student.events.length === 0) {
        eventsDiv.innerHTML = '<p class="text-gray-500 mt-3">Nenhum evento encontrado.</p>';
        return;
    }

    let html = `
        <div class="mt-4">
            <h3 class="font-semibold mb-2 text-gray-700">Eventos Participados:</h3>
    `;

    student.events.forEach(event => {
        const hours = eventHours[event] || 0;

        html += `
            <div class="bg-gray-100 p-3 rounded-lg mb-2 flex justify-between items-center">
                <span>${event}</span>
                <span class="font-bold text-blue-600">${hours}h</span>
            </div>
        `;
    });

    html += '</div>';

    eventsDiv.innerHTML = html;
});

// ENTER = buscar
raInput.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') {
        searchButton.click();
    }
});

</script>

</body>
</html>
