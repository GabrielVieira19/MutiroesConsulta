<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mutirões - Consulta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-center bg-cover"
      style="background-image: url('logo.png');">

<div class="absolute inset-0 bg-black/40"></div>

<div class="relative bg-white/90 rounded-2xl shadow-xl p-6 w-full max-w-xl">

    <!-- MENU -->
    <div class="flex gap-2 mb-4">
        <button id="btnConsulta" class="bg-blue-500 text-white px-4 py-2 rounded">Consulta</button>
        <button id="btnInfo" class="bg-gray-500 text-white px-4 py-2 rounded">Info</button>
        <button id="btnValidacao" class="bg-gray-500 text-white px-4 py-2 rounded">Validação</button>
    </div>

    <!-- CONSULTA -->
    <div id="abaConsulta">

        <input id="raInput" placeholder="Digite seu RA"
            class="w-full p-3 border rounded mb-3">

        <button id="searchButton"
            class="w-full bg-blue-500 text-white p-3 rounded">
            Consultar
        </button>

        <div id="result" class="mt-4 text-center"></div>
        <div id="eventsList" class="mt-4"></div>

    </div>

    <!-- INFO -->
    <div id="abaInfo" class="hidden">
        <h2 class="text-lg font-bold mb-2">Contato</h2>
        <p>mutiroes@unicamp.br</p>
    </div>

    <!-- VALIDAÇÃO -->
    <div id="abaValidacao" class="hidden">

        <input id="raValidacao" placeholder="RA"
            class="w-full p-3 border rounded mb-2">

        <input id="horasValidacao" type="number" placeholder="Horas"
            class="w-full p-3 border rounded mb-2">

        <button id="btnValidar"
            class="w-full bg-green-500 text-white p-3 rounded">
            Validar
        </button>

        <div id="msgValidacao" class="mt-3 text-center"></div>

    </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbw5c_x10xh_jFN_WU35r7Ha1yxC3HhXqrFXItG3uepytXqkQJRD1yNpBHPXWpUfQn0T/exec";

// CONSULTA DAS HORAS ACUMULADAS
document.getElementById('searchButton').onclick = async () => {

    const btn = document.getElementById('searchButton');
    btn.disabled = true;

    const ra = document.getElementById('raInput').value.trim();
    const resultDiv = document.getElementById('result');
    const eventsDiv = document.getElementById('eventsList');

    if (!ra) {
        resultDiv.innerHTML = "<p class='text-red-600'>Digite um RA válido</p>";
        btn.disabled = false;
        return;
    }

    resultDiv.innerHTML = "<p class='text-blue-600'>Obtendo dados...</p>";
    eventsDiv.innerHTML = "";

    try {

        const res = await fetch(`${URL}?ra=${ra}`);
        const data = await res.json();

        if (data.erro) {
            resultDiv.innerHTML = `<p class='text-red-600'>${data.erro}</p>`;
            btn.disabled = false;
            return;
        }

        let horas = Number(data.student.hours) || 0;
        let validadas = Number(data.student.requestedHours) || 0;
        let status = data.student.status;

        if (status === "Validado") {
            horas -= validadas;
        }

        // HORAS
        resultDiv.innerHTML = `
            <p class="text-2xl text-green-600 font-bold">
                ${horas} horas acumuladas
            </p>
        `;

        // STATUS VALIDAÇÃO
        if (status && status !== "Sem solicitação") {

            let cor = "text-red-600";
            if (status === "Pendente") cor = "text-yellow-500";
            if (status === "Validado") cor = "text-green-600";

            resultDiv.innerHTML += `
                <p class="text-lg ${cor} mt-2 font-semibold">
                    Horas Validadas: ${validadas}h | ${status}
                </p>
            `;
        }

        // EVENTOS
        const eventInfo = data.eventInfo;

        let html = "<h3 class='mt-4 font-semibold'>Eventos:</h3>";

        data.student.events.forEach(e => {

            const info = eventInfo[e] || {};

            html += `
                <div class="bg-gray-100 p-3 mt-2 rounded">
                    <div class="flex justify-between">
                        <span>${e}</span>
                        <span class="text-blue-600 font-bold">${info.horas || 0}h</span>
                    </div>
                    <div class="text-sm text-gray-500">
                        Data: ${info.data || "Sem data"}
                    </div>
                </div>
            `;
        });

        eventsDiv.innerHTML = html;

    } catch {
        resultDiv.innerHTML = "<p class='text-red-600'>Erro ao buscar dados</p>";
    }

    setTimeout(() => btn.disabled = false, 2000);
};


// VALIDAÇÃO
document.getElementById('btnValidar').onclick = async () => {

    const btn = document.getElementById('btnValidar');
    btn.disabled = true;

    const ra = document.getElementById('raValidacao').value.trim();
    const horas = Number(document.getElementById('horasValidacao').value);
    const msg = document.getElementById('msgValidacao');

    if (!ra || !horas) {
        msg.innerHTML = "<p class='text-red-600'>Preencha todos os campos</p>";
        btn.disabled = false;
        return;
    }

    msg.innerHTML = "<p class='text-blue-600'>Verificando...</p>";

    try {

        // Verifica antes de enviar solicitação
        const res = await fetch(`${URL}?ra=${ra}`);
        const data = await res.json();

        if (data.student.status === "Pendente") {
            msg.innerHTML = "<p class='text-red-600'>Já possui solicitação em aberto</p>";
            btn.disabled = false;
            return;
        }

        let total = Number(data.student.hours) || 0;
        let usadas = Number(data.student.requestedHours) || 0;

        if (data.student.status === "Validado") {
            total -= usadas;
        }

        if (horas > total) {
            msg.innerHTML = "<p class='text-red-600'>Horas insuficientes</p>";
            btn.disabled = false;
            return;
        }

        msg.innerHTML = "<p class='text-blue-600'>Enviando...</p>";

        const response = await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                ra: ra,
                hours: horas
            })
        });

        const result = await response.json();

        if (result.sucesso) {
            msg.innerHTML = "<p class='text-green-600'>Solicitação enviada com sucesso!</p>";
        } else {
            msg.innerHTML = `<p class='text-red-600'>${result.erro}</p>`;
        }

    } catch {
        msg.innerHTML = "<p class='text-red-600'>Erro de conexão</p>";
    }

    setTimeout(() => btn.disabled = false, 2000);
};



// ABAS
const abaConsulta = document.getElementById('abaConsulta');
const abaInfo = document.getElementById('abaInfo');
const abaValidacao = document.getElementById('abaValidacao');

document.getElementById('btnConsulta').onclick = () => {
    abaConsulta.classList.remove('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.add('hidden');
};

document.getElementById('btnInfo').onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.remove('hidden');
    abaValidacao.classList.add('hidden');
};

document.getElementById('btnValidacao').onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.remove('hidden');
};

</script>

</body>
</html>
