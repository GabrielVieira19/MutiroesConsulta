<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutirões - Consulta de Horas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-center bg-no-repeat bg-cover"
      style="background-image: url('logo.png');">

<div class="absolute inset-0 bg-black/40"></div>

<div class="relative bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl w-full max-w-xl p-6">

    <!-- MENU -->
    <div class="flex gap-2 mb-4">
        <button id="btnConsulta" class="bg-blue-500 text-white px-4 py-2 rounded-lg">Consulta</button>
        <button id="btnInfo" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Informações</button>
        <button id="btnValidacao" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Validação</button>
    </div>

    <!-- ABA CONSULTA -->
    <div id="abaConsulta">

        <div class="flex flex-col items-center mb-6">
            <img src="logo.png" class="w-32 mb-2">
            <h1 class="text-2xl font-bold">Mutirões</h1>
        </div>

        <input id="raInput" placeholder="Digite seu RA"
            class="w-full p-3 border rounded-xl mb-4">

        <button id="searchButton"
            class="w-full bg-blue-500 text-white p-3 rounded-xl mb-4">
            Consultar
        </button>

        <div id="result" class="text-center"></div>
        <div id="eventsList"></div>

    </div>

    <!-- ABA INFORMAÇÕES -->
    <div id="abaInfo" class="hidden">
        <h2 class="text-xl font-bold mb-4">Informações</h2>
        <p>Email: mutiroes@unicamp.br</p>
        <p>WhatsApp: (19) 99999-9999</p>
    </div>

    <!-- ABA VALIDAÇÃO -->
    <div id="abaValidacao" class="hidden">

        <h2 class="text-xl font-bold mb-4">Validação de Créditos</h2>

        <p class="mb-3">Informe as horas para validação</p>

        <input id="raValidacao" placeholder="Digite seu RA"
            class="w-full p-3 border rounded-xl mb-3">

        <input id="horasValidacao" type="number" placeholder="Horas"
            class="w-full p-3 border rounded-xl mb-3">

        <button id="btnValidar"
            class="w-full bg-green-500 text-white p-3 rounded-xl">
            Validar
        </button>

        <div id="msgValidacao" class="mt-4 text-center"></div>

    </div>

</div>

<script>

const URL = 'https://script.google.com/macros/s/AKfycbznBys52q43XQnK79b6N6yPlxJWV5AvB0cDT_ifF7T9ddJtZlvaTo48UlOnGtK31nrT/exec';

// ELEMENTOS
const raInput = document.getElementById('raInput');
const resultDiv = document.getElementById('result');
const eventsDiv = document.getElementById('eventsList');

// 🔍 CONSULTA
document.getElementById('searchButton').addEventListener('click', async () => {

    const ra = raInput.value.trim();

    const res = await fetch(`${URL}?ra=${ra}`);
    const data = await res.json();

    if (data.erro) {
        resultDiv.innerHTML = data.erro;
        return;
    }

    const student = data.student;

    resultDiv.innerHTML = `
        <p class="text-2xl text-green-600">${student.hours} horas acumuladas</p>
    `;

    // 🔴 HORAS VALIDADAS
    if (student.status && student.status !== "Sem solicitação") {
        resultDiv.innerHTML += `
            <p class="text-red-600">
                ${student.requestedHours}h - ${student.status}
            </p>
        `;
    }

    // EVENTOS
    let html = "";
    student.events.forEach(e => {
        html += `<div>${e}</div>`;
    });

    eventsDiv.innerHTML = html;

});

// 📤 VALIDAÇÃO
document.getElementById('btnValidar').addEventListener('click', async () => {

    const ra = document.getElementById('raValidacao').value;
    const horas = document.getElementById('horasValidacao').value;

    const res = await fetch(URL, {
        method: "POST",
        body: JSON.stringify({ ra, hours: horas })
    });

    const data = await res.json();

    document.getElementById('msgValidacao').innerHTML =
        data.sucesso ? "Solicitação enviada!" : "Erro na solicitação";

});

// 🔄 ABAS
const abaConsulta = document.getElementById('abaConsulta');
const abaInfo = document.getElementById('abaInfo');
const abaValidacao = document.getElementById('abaValidacao');

document.getElementById('btnConsulta').onclick = () => {
    abaConsulta.classList.remove('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.add('hidden');
};

document.getElementById('btnInfo').onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.remove('hidden');
    abaValidacao.classList.add('hidden');
};

document.getElementById('btnValidacao').onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.remove('hidden');
};

</script>

</body>
</html>
