<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutirões - Consulta de Horas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-center bg-no-repeat bg-cover"
      style="background-image: url('logo.png');">

    <div class="absolute inset-0 bg-black/40"></div>

    <div class="relative bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl w-full max-w-xl p-6">

        <!-- MENU -->
        <div class="flex gap-2 mb-4">
            <button id="btnConsulta" class="bg-blue-500 text-white px-4 py-2 rounded-lg">Consulta</button>
            <button id="btnInfo" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Informações</button>
            <button id="btnValidacao" class="bg-gray-500 text-white px-4 py-2 rounded-lg">Validação</button>
        </div>

        <!-- CONSULTA -->
        <div id="abaConsulta">
            <div class="flex flex-col items-center mb-6">
                <img src="mutiroes.png" class="w-32 mb-2">
                <p class="text-gray-500 text-sm">Consulta de horas acumuladas</p>
            </div>

            <input id="raInput" placeholder="Digite seu RA"
                class="w-full p-3 border rounded-xl mb-4">

            <button id="searchButton"
                class="w-full bg-blue-500 text-white p-3 rounded-xl">
                Consultar
            </button>

            <div id="result" class="mt-6 text-center"></div>
            <div id="eventsList" class="mt-4"></div>
        </div>

        <!-- INFO -->
        <div id="abaInfo" class="hidden">
            <h2 class="text-xl font-bold mb-4">Informações</h2>

            <div class="bg-gray-100 p-4 rounded-lg space-y-2">
                <p>📧 mutiroes@unicamp.br</p>
                <p>📱 Brunna - (12) 99141-3321</p>
                <p>📱 Gabriel - (16) 98172-2100</p>
            </div>
        </div>

        <!-- VALIDAÇÃO -->
        <div id="abaValidacao" class="hidden">
            <h2 class="text-xl font-bold mb-4">Validação de Créditos</h2>

            <input id="raValidacao" placeholder="RA"
                class="w-full p-3 border rounded-xl mb-3">

            <input id="horasValidacao" type="number" placeholder="Horas"
                class="w-full p-3 border rounded-xl mb-3">

            <button id="btnValidar"
                class="w-full bg-green-500 text-white p-3 rounded-xl">
                Validar
            </button>

            <div id="msgValidacao" class="mt-4 text-center"></div>
        </div>

    </div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbw5c_x10xh_jFN_WU35r7Ha1yxC3HhXqrFXItG3uepytXqkQJRD1yNpBHPXWpUfQn0T/exec";

const resultDiv = document.getElementById('result');
const eventsDiv = document.getElementById('eventsList');

// CONSULTA
document.getElementById('searchButton').onclick = async () => {

    const ra = document.getElementById('raInput').value.trim();

    if (!ra) {
        resultDiv.innerHTML = '<p class="text-red-600">Digite um RA válido.</p>';
        return;
    }

    // 🔄 LOADING
    resultDiv.innerHTML = '<p class="text-blue-600">Obtendo dados...</p>';
    eventsDiv.innerHTML = '';

    try {

        const response = await fetch(`${URL}?ra=${ra}`);
        const data = await response.json();

        if (data.erro) {
            resultDiv.innerHTML = `<p class="text-red-600">${data.erro}</p>`;
            return;
        }

        const student = data.student;
        const eventHours = data.eventHours;

        let horasTotais = Number(student.hours) || 0;
        let horasValidadas = Number(student.requestedHours) || 0;
        let status = student.status;

        // 🔥 DESCONTO SE VALIDADO
        if (status === "Realizada") {
            horasTotais -= horasValidadas;
        }

        // 🎯 HORAS
        resultDiv.innerHTML = `
            <p class="text-2xl font-bold text-green-600">
                ${horasTotais} horas acumuladas
            </p>
        `;

        // 🔴 HORAS VALIDADAS
        if (status && status !== "Sem solicitação") {
            resultDiv.innerHTML += `
                <p class="text-2xl font-bold text-red-600 mt-2">
                    Horas Validadas: ${horasValidadas}h | ${status}
                </p>
            `;
        }

        // EVENTOS
        let html = `<h3 class="mt-4 font-semibold">Eventos:</h3>`;

        student.events.forEach(e => {
            html += `
                <div class="flex justify-between bg-gray-100 p-2 rounded mt-2">
                    <span>${e}</span>
                    <span>${eventHours[e] || 0}h</span>
                </div>
            `;
        });

        eventsDiv.innerHTML = html;

    } catch (error) {
        console.error(error);
        resultDiv.innerHTML = '<p class="text-red-600">Erro ao buscar dados.</p>';
    }
};
// VALIDAÇÃO (SEM CORS PROBLEMA)
document.getElementById('btnValidar').onclick = async () => {

    const ra = document.getElementById('raValidacao').value;
    const horas = document.getElementById('horasValidacao').value;
    const msg = document.getElementById('msgValidacao');

    msg.innerHTML = "Enviando...";

    try {

        const response = await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                ra: ra,
                hours: horas
            })
        });

        const data = await response.json();

        if (data.sucesso) {
            msg.innerHTML = '<p class="text-green-600">Enviado com sucesso!</p>';
        } else {
            msg.innerHTML = `<p class="text-red-600">${data.erro}</p>`;
        }

    } catch (e) {
        msg.innerHTML = '<p class="text-red-600">Erro de conexão</p>';
    }
};

// ABAS
btnConsulta.onclick = () => {
    abaConsulta.classList.remove('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.add('hidden');
};

btnInfo.onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.remove('hidden');
    abaValidacao.classList.add('hidden');
};

btnValidacao.onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.remove('hidden');
};

</script>

</body>
</html>
