<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mutirões - Consulta</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-6 bg-center bg-cover"
      style="background-image: url('logo.png');">

<div class="absolute inset-0 bg-black/40"></div>

<div class="relative bg-white/90 rounded-2xl shadow-xl p-6 w-full max-w-xl">

    <!-- MENU -->
    <div class="flex gap-2 mb-4">
        <button id="btnConsulta" class="bg-blue-500 text-white px-4 py-2 rounded">Consulta</button>
        <button id="btnInfo" class="bg-gray-500 text-white px-4 py-2 rounded">Info</button>
        <button id="btnValidacao" class="bg-gray-500 text-white px-4 py-2 rounded">Validação</button>
    </div>

    <!-- CONSULTA -->
    <div id="abaConsulta">

        <input id="raInput" placeholder="Digite seu RA"
            class="w-full p-3 border rounded mb-3">

        <button id="searchButton"
            class="w-full bg-blue-500 text-white p-3 rounded">
            Consultar
        </button>

        <div id="result" class="mt-4 text-center"></div>
        <div id="eventsList" class="mt-4"></div>

    </div>

    <!-- INFO -->
    <div id="abaInfo" class="hidden">
        <h2 class="text-lg font-bold mb-2">Contato</h2>
        <p>mutiroes@unicamp.br</p>
    </div>

    <!-- VALIDAÇÃO -->
    <div id="abaValidacao" class="hidden">

        <input id="raValidacao" placeholder="RA"
            class="w-full p-3 border rounded mb-2">

        <input id="horasValidacao" type="number" placeholder="Horas"
            class="w-full p-3 border rounded mb-2">

        <button id="btnValidar"
            class="w-full bg-green-500 text-white p-3 rounded">
            Validar
        </button>

        <div id="msgValidacao" class="mt-3 text-center"></div>

    </div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbw5c_x10xh_jFN_WU35r7Ha1yxC3HhXqrFXItG3uepytXqkQJRD1yNpBHPXWpUfQn0T/exec";

// CONSULTA
document.getElementById('searchButton').onclick = async () => {

    const ra = document.getElementById('raInput').value.trim();
    const resultDiv = document.getElementById('result');
    const eventsDiv = document.getElementById('eventsList');

    if (!ra) {
        resultDiv.innerHTML = "Digite um RA válido";
        return;
    }

    resultDiv.innerHTML = "Obtendo dados...";
    eventsDiv.innerHTML = "";

    try {

        const res = await fetch(`${URL}?ra=${ra}`);
        const data = await res.json();

        if (data.erro) {
            resultDiv.innerHTML = data.erro;
            return;
        }

        let horas = Number(data.student.hours) || 0;
        let validadas = Number(data.student.requestedHours) || 0;
        let status = data.student.status;

        if (status === "Realizada") {
            horas -= validadas;
        }

        resultDiv.innerHTML = `
            <p class="text-2xl text-green-600">${horas} horas acumuladas</p>
        `;

        if (status && status !== "Sem solicitação") {
            resultDiv.innerHTML += `
                <p class="text-2xl text-red-600">
                    Horas Validadas: ${validadas}h | ${status}
                </p>
            `;
        }

        // 🔥 NOVO: usar eventInfo
        const eventInfo = data.eventInfo;

        let html = "<h3 class='mt-4'>Eventos:</h3>";

        data.student.events.forEach(e => {

            const info = eventInfo[e] || {};
            const horasEvento = info.horas || 0;

            let dataEvento = info.data || "Sem data";

            // formata data se possível
            try {
                dataEvento = new Date(dataEvento).toLocaleDateString('pt-BR');
            } catch {}

            html += `
                <div class="bg-gray-100 p-3 mt-2 rounded">
                    <div class="flex justify-between">
                        <span class="font-medium">${e}</span>
                        <span class="text-blue-600 font-bold">${horasEvento}h</span>
                    </div>
                    <div class="text-sm text-gray-600 mt-1">
                        Data: ${dataEvento}
                    </div>
                </div>
            `;
        });

        eventsDiv.innerHTML = html;

    } catch (e) {
        resultDiv.innerHTML = "Erro ao buscar dados";
    }
};

// VALIDAÇÃO
document.getElementById('btnValidar').onclick = async () => {

    const ra = document.getElementById('raValidacao').value;
    const horas = document.getElementById('horasValidacao').value;
    const msg = document.getElementById('msgValidacao');

    if (!ra || !horas) {
        msg.innerHTML = "Preencha tudo";
        return;
    }

    msg.innerHTML = "Enviando...";

    try {

        const response = await fetch(URL, {
            method: "POST",
            body: new URLSearchParams({
                ra: ra,
                hours: horas
            })
        });

        const text = await response.text();
        console.log("Resposta:", text);

        let data;

        try {
            data = JSON.parse(text);
        } catch {
            msg.innerHTML = "Erro inesperado do servidor";
            return;
        }

        if (data.sucesso) {
            msg.innerHTML = "Solicitação enviada!";
        } else {
            msg.innerHTML = data.erro || "Erro";
        }

    } catch {
        msg.innerHTML = "Erro de conexão";
    }
};

// ABAS
btnConsulta.onclick = () => {
    abaConsulta.classList.remove('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.add('hidden');
};

btnInfo.onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.remove('hidden');
    abaValidacao.classList.add('hidden');
};

btnValidacao.onclick = () => {
    abaConsulta.classList.add('hidden');
    abaInfo.classList.add('hidden');
    abaValidacao.classList.remove('hidden');
};

</script>

</body>
</html>
